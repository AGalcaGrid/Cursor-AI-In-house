services:
  # React Frontend (Port 3000)
  react-app:
    build:
      context: ./react-app
      dockerfile: Dockerfile.dev
    container_name: react-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:5003
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=3000
    volumes:
      - ./react-app/src:/app/src
      - ./react-app/public:/app/public
    depends_on:
      - blog-api
      - customer-support-api
      - support-ticket-api
      - task-management-api
      - ecommerce-api
    stdin_open: true
    tty: true
    networks:
      - app-network
    restart: unless-stopped

  # Shared Redis - Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: shared-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Blog API (Port 5000)
  blog-api:
    build:
      context: ./blog-api
      dockerfile: ../Dockerfile.python-api
    container_name: blog-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=sqlite:///instance/blog.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./blog-api:/app
      - blog_instance:/app/instance
    depends_on:
      redis:
        condition: service_healthy
    command: python run.py
    networks:
      - app-network

  # Customer Support API (Port 5001)
  customer-support-api:
    build:
      context: ./customer-support-api
      dockerfile: ../Dockerfile.python-api
    container_name: customer-support-api
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=jwt-secret-key-change-in-production
      - DATABASE_URL=sqlite:///instance/customer_support.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./customer-support-api:/app
      - customer_support_instance:/app/instance
    depends_on:
      redis:
        condition: service_healthy
    command: python run.py
    networks:
      - app-network

  # Support Ticket API (Port 5002)
  support-ticket-api:
    build:
      context: ./support-ticket-api
      dockerfile: ../Dockerfile.python-api
    container_name: support-ticket-api
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=jwt-secret-key-change-in-production
      - DATABASE_URL=sqlite:///instance/support_tickets.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./support-ticket-api:/app
      - support_ticket_instance:/app/instance
    depends_on:
      redis:
        condition: service_healthy
    command: python run.py
    networks:
      - app-network

  # Task Management API (Port 5003)
  task-management-api:
    build:
      context: ./task-management-api
      dockerfile: ../Dockerfile.python-api
    container_name: task-management-api
    ports:
      - "5003:5003"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=jwt-secret-key-change-in-production
      - DATABASE_URL=sqlite:///instance/dev.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USE_TLS=true
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - ./task-management-api:/app
      - task_instance:/app/instance
    depends_on:
      redis:
        condition: service_healthy
    command: python run.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # E-Commerce API (Port 5004)
  ecommerce-api:
    build:
      context: ./ecommerce-api
      dockerfile: Dockerfile
    container_name: ecommerce-api
    ports:
      - "5004:5004"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=jwt-secret-key-change-in-production
      - DATABASE_URL=sqlite:////app/instance/ecommerce.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - STRIPE_SECRET_KEY=sk_test_mock_key
      - STRIPE_PUBLISHABLE_KEY=pk_test_mock_key
      - STRIPE_WEBHOOK_SECRET=whsec_mock_secret
      - SENDGRID_API_KEY=mock_sendgrid_key
      - FROM_EMAIL=noreply@ecommerce.local
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./ecommerce-api:/app
      - ecommerce_instance:/app/instance
    depends_on:
      redis:
        condition: service_healthy
    command: python run.py
    networks:
      - app-network

  # Celery Worker for Task Management API
  celery-worker:
    build:
      context: ./task-management-api
      dockerfile: ../Dockerfile.python-api
    container_name: task-api-celery-worker
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=sqlite:///instance/dev.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USE_TLS=true
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - ./task-management-api:/app
      - task_instance:/app/instance
    depends_on:
      redis:
        condition: service_healthy
      task-management-api:
        condition: service_healthy
    command: celery -A celery_worker.celery worker --loglevel=info
    networks:
      - app-network

  # Celery Beat for Task Management API
  celery-beat:
    build:
      context: ./task-management-api
      dockerfile: ../Dockerfile.python-api
    container_name: task-api-celery-beat
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=sqlite:///instance/dev.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./task-management-api:/app
      - task_instance:/app/instance
    depends_on:
      redis:
        condition: service_healthy
      task-management-api:
        condition: service_healthy
    command: celery -A celery_worker.celery beat --loglevel=info
    networks:
      - app-network

volumes:
  redis_data:
    driver: local
  blog_instance:
    driver: local
  customer_support_instance:
    driver: local
  support_ticket_instance:
    driver: local
  task_instance:
    driver: local
  ecommerce_instance:
    driver: local

networks:
  app-network:
    driver: bridge
