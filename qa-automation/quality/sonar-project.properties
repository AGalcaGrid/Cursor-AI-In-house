# SonarQube Project Configuration
# Required metadata
sonar.projectKey=support-ticket-api
sonar.projectName=Support Ticket API
sonar.projectVersion=1.0.0

# Project description
sonar.projectDescription=Support Ticket Management API with React Frontend

# Source code locations
sonar.sources=app,frontend/src
sonar.tests=tests,qa-automation/tests,frontend/src/__tests__

# Language settings
sonar.language=py,ts,tsx,js,jsx

# Python settings
sonar.python.version=3.9,3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.pylint.reportPaths=pylint-report.txt
sonar.python.bandit.reportPaths=bandit-report.json

# TypeScript/JavaScript settings
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.eslint.reportPaths=frontend/eslint-report.json

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=\
    **/node_modules/**,\
    **/venv/**,\
    **/.venv/**,\
    **/dist/**,\
    **/build/**,\
    **/__pycache__/**,\
    **/migrations/**,\
    **/*.min.js,\
    **/*.min.css,\
    **/coverage/**,\
    **/htmlcov/**,\
    **/.pytest_cache/**

# Test exclusions
sonar.test.exclusions=\
    **/test_*.py,\
    **/*_test.py,\
    **/conftest.py,\
    **/*.test.ts,\
    **/*.test.tsx,\
    **/*.spec.ts,\
    **/*.spec.tsx,\
    **/tests/**,\
    **/__tests__/**

# Coverage exclusions
sonar.coverage.exclusions=\
    **/test_*.py,\
    **/*_test.py,\
    **/conftest.py,\
    **/*.test.ts,\
    **/*.test.tsx,\
    **/tests/**,\
    **/__tests__/**,\
    **/migrations/**

# Duplication exclusions
sonar.cpd.exclusions=\
    **/test_*.py,\
    **/*.test.ts,\
    **/*.test.tsx

# Quality Gate settings
sonar.qualitygate.wait=true

# Issue settings
sonar.issue.ignore.multicriteria=e1,e2

# Ignore missing docstrings in test files
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1186
sonar.issue.ignore.multicriteria.e1.resourceKey=**/test_*.py

# Ignore cognitive complexity in test files
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=**/test_*.py

# Analysis parameters
sonar.scm.provider=git
sonar.scm.forceReloadAll=false

# Branch analysis (for SonarQube Developer Edition+)
# sonar.branch.name=${BRANCH_NAME}

# Pull request analysis
# sonar.pullrequest.key=${PR_NUMBER}
# sonar.pullrequest.branch=${PR_BRANCH}
# sonar.pullrequest.base=${PR_TARGET}

# External analyzers
sonar.python.xunit.reportPath=test-results.xml
sonar.python.xunit.skipDetails=false

# Security hotspots
sonar.security.hotspots.inheritedRules=true

# New code definition
sonar.newCode.referenceBranch=main
