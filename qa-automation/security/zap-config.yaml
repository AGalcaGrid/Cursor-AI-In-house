# OWASP ZAP Configuration for Automated Security Scanning
# https://www.zaproxy.org/docs/docker/api-scan/

env:
  contexts:
    - name: "Support Ticket API"
      urls:
        - "http://localhost:5000"
        - "http://localhost:3000"
      includePaths:
        - "http://localhost:5000/api/.*"
        - "http://localhost:3000/.*"
      excludePaths:
        - ".*\\.js$"
        - ".*\\.css$"
        - ".*\\.png$"
        - ".*\\.jpg$"
        - ".*\\.gif$"
        - ".*\\.ico$"
        - ".*\\.woff2?$"
      authentication:
        method: "json"
        parameters:
          loginPageUrl: "http://localhost:5000/api/auth/login"
          loginRequestUrl: "http://localhost:5000/api/auth/login"
          loginRequestBody: '{"email":"{%username%}","password":"{%password%}"}'
          usernameParameter: "email"
          passwordParameter: "password"
        verification:
          method: "response"
          loggedInRegex: ".*token.*"
          loggedOutRegex: ".*Unauthorized.*"
      users:
        - name: "test-user"
          credentials:
            username: "test@example.com"
            password: "password123"
      sessionManagement:
        method: "headers"
        parameters:
          Authorization: "Bearer {%token%}"

jobs:
  - type: spider
    parameters:
      context: "Support Ticket API"
      user: "test-user"
      maxDuration: 10
      maxDepth: 5
      maxChildren: 10
      acceptCookies: true
      handleODataParametersVisited: false
      handleParameters: "USE_ALL"
      parseComments: true
      parseGit: false
      parseSVN: false
      parseRobotsTxt: true
      parseSitemapXml: true

  - type: spiderAjax
    parameters:
      context: "Support Ticket API"
      user: "test-user"
      maxDuration: 10
      maxCrawlDepth: 5
      numberOfBrowsers: 2
      browserId: "chrome-headless"
      clickDefaultElems: true
      clickElemsOnce: true
      eventWait: 1000
      reloadWait: 1000

  - type: passiveScan-config
    parameters:
      maxAlertsPerRule: 10
      scanOnlyInScope: true
      maxBodySizeInBytesToScan: 10000

  - type: passiveScan-wait
    parameters:
      maxDuration: 5

  - type: activeScan
    parameters:
      context: "Support Ticket API"
      user: "test-user"
      policy: "API-Scan-Policy"
      maxRuleDurationInMins: 5
      maxScanDurationInMins: 30
      addQueryParam: true
      defaultPolicy: "API-Scan-Policy"
      delayInMs: 0
      handleAntiCSRFTokens: true
      injectPluginIdInHeader: false
      scanHeadersAllRequests: true
      threadPerHost: 5

  - type: report
    parameters:
      template: "traditional-html-plus"
      reportDir: "/zap/reports"
      reportFile: "zap-report"
      reportTitle: "ZAP Security Scan Report"
      reportDescription: "Automated security scan for Support Ticket API"
    risks:
      - high
      - medium
      - low
      - info
    confidences:
      - high
      - medium
      - low

# Alert filters - customize based on your application
alertFilters:
  - ruleId: 10021  # X-Content-Type-Options Header Missing
    newRisk: "Low"
    context: "Support Ticket API"
    
  - ruleId: 10038  # Content Security Policy Header Not Set
    newRisk: "Medium"
    context: "Support Ticket API"

# Scan policies
policies:
  - name: "API-Scan-Policy"
    rules:
      # SQL Injection
      - id: 40018
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # Cross Site Scripting (Reflected)
      - id: 40012
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # Cross Site Scripting (Persistent)
      - id: 40014
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # Path Traversal
      - id: 6
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # Remote File Inclusion
      - id: 7
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # Server Side Include
      - id: 40009
        strength: "LOW"
        threshold: "MEDIUM"
      # External Redirect
      - id: 20019
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # CRLF Injection
      - id: 40003
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # Parameter Tampering
      - id: 40008
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # LDAP Injection
      - id: 40015
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # XML External Entity Attack
      - id: 90023
        strength: "MEDIUM"
        threshold: "MEDIUM"
      # Server Side Request Forgery
      - id: 40046
        strength: "MEDIUM"
        threshold: "MEDIUM"
