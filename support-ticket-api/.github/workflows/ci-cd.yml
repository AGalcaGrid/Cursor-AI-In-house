name: Full-Stack CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.10'

jobs:
  # ============================================
  # Backend Tests
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run linting
        run: |
          pip install flake8
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run backend tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=html -v
        env:
          FLASK_ENV: testing
          DATABASE_URL: sqlite:///:memory:

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: backend
          name: backend-coverage

  # ============================================
  # Frontend Tests
  # ============================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ../react-app/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd ../react-app
          npm ci

      - name: Run linting
        run: |
          cd ../react-app
          npm run lint --if-present

      - name: Run frontend tests
        run: |
          cd ../react-app
          npm test -- --coverage --watchAll=false
        env:
          CI: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ../react-app/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  # ============================================
  # Build Frontend
  # ============================================
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ../react-app/package-lock.json

      - name: Install dependencies
        run: |
          cd ../react-app
          npm ci

      - name: Build frontend
        run: |
          cd ../react-app
          npm run build
        env:
          CI: true
          REACT_APP_API_URL: ${{ vars.API_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ../react-app/dist/
          retention-days: 7

  # ============================================
  # Build Backend Docker Image
  # ============================================
  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/support-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Deploy frontend to staging
        run: |
          echo "Deploying frontend to staging..."
          # Example: AWS S3 deployment
          # aws s3 sync frontend/build/ s3://${{ secrets.STAGING_S3_BUCKET }} --delete

      - name: Deploy backend to staging
        run: |
          echo "Deploying backend to staging..."
          # Example: SSH deployment or container orchestration
          # ssh ${{ secrets.STAGING_SERVER }} "docker pull ${{ secrets.DOCKER_USERNAME }}/support-api:develop && docker-compose up -d"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging-api.example.com/health || exit 1

  # ============================================
  # Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Deploy frontend to production
        run: |
          echo "Deploying frontend to production..."
          # Example: AWS S3 + CloudFront deployment
          # aws s3 sync frontend/build/ s3://${{ secrets.PROD_S3_BUCKET }} --delete
          # aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} --paths "/*"

      - name: Deploy backend to production
        run: |
          echo "Deploying backend to production..."
          # Example: Kubernetes deployment
          # kubectl set image deployment/support-api support-api=${{ secrets.DOCKER_USERNAME }}/support-api:latest

      - name: Run health check
        run: |
          echo "Running production health check..."
          # curl -f https://api.example.com/health || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment successful! 🚀"
          # Example: Slack notification
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Production deployment successful!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deployment failed! ❌"
          # Example: Slack notification for failure
