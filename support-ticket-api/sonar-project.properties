# SonarCloud Configuration
sonar.projectKey=support-ticket-api
sonar.organization=your-org

# Project metadata
sonar.projectName=Support Ticket API
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/migrations/**,**/build/**,**/dist/**

# Test exclusions
sonar.test.exclusions=**/test_*.py,**/*.test.js,**/*.spec.js

# Coverage reports
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Language settings
sonar.python.version=3.10

# Encoding
sonar.sourceEncoding=UTF-8
